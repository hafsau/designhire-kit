<svg width="1080" height="1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg5)"/>

  <!-- Title -->
  <text x="100" y="130" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff">58 ready-to-use</text>
  <text x="100" y="195" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff">DESIGN.md templates</text>

  <!-- Grid of company "cards" -->
  <!-- Row 1 -->
  <rect x="80" y="280" width="200" height="90" fill="#111" rx="12" stroke="#333" stroke-width="1"/>
  <text x="180" y="335" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle">Figma</text>

  <rect x="300" y="280" width="200" height="90" fill="#111" rx="12" stroke="#333" stroke-width="1"/>
  <text x="400" y="335" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle">Linear</text>

  <rect x="520" y="280" width="200" height="90" fill="#111" rx="12" stroke="#333" stroke-width="1"/>
  <text x="620" y="335" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle">Stripe</text>

  <rect x="740" y="280" width="200" height="90" fill="#111" rx="12" stroke="#333" stroke-width="1"/>
  <text x="840" y="335" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle">Notion</text>

  <!-- Row 2 -->
  <rect x="80" y="390" width="200" height="90" fill="#111" rx="12" stroke="#333" stroke-width="1"/>
  <text x="180" y="445" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle">Vercel</text>

  <rect x="300" y="390" width="200" height="90" fill="#111" rx="12" stroke="#333" stroke-width="1"/>
  <text x="400" y="445" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle">Airbnb</text>

  <rect x="520" y="390" width="200" height="90" fill="#111" rx="12" stroke="#333" stroke-width="1"/>
  <text x="620" y="445" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle">Spotify</text>

  <rect x="740" y="390" width="200" height="90" fill="#111" rx="12" stroke="#333" stroke-width="1"/>
  <text x="840" y="445" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle">Apple</text>

  <!-- Row 3 -->
  <rect x="80" y="500" width="200" height="90" fill="#111" rx="12" stroke="#333" stroke-width="1"/>
  <text x="180" y="555" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle">Supabase</text>

  <rect x="300" y="500" width="200" height="90" fill="#111" rx="12" stroke="#333" stroke-width="1"/>
  <text x="400" y="555" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle">Framer</text>

  <rect x="520" y="500" width="200" height="90" fill="#111" rx="12" stroke="#333" stroke-width="1"/>
  <text x="620" y="555" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle">Coinbase</text>

  <rect x="740" y="500" width="200" height="90" fill="#111" rx="12" stroke="#333" stroke-width="1"/>
  <text x="840" y="555" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle">Tesla</text>

  <!-- And more indicator -->
