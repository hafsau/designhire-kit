  <!-- Slide indicator dots -->
  <circle cx="450" cy="1250" r="6" fill="#444"/>
  <circle cx="480" cy="1250" r="6" fill="#444"/>
  <circle cx="510" cy="1250" r="6" fill="#444"/>
  <circle cx="540" cy="1250" r="6" fill="#444"/>
  <circle cx="570" cy="1250" r="8" fill="#3b82f6"/>
  <circle cx="600" cy="1250" r="6" fill="#444"/>
  <circle cx="630" cy="1250" r="6" fill="#444"/>
