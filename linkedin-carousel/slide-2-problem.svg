<svg width="1080" height="1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="100" y="180" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff">The problem with</text>
  <text x="100" y="245" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff">AI-generated UI:</text>

  <!-- Problem list -->
  <text x="100" y="380" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="36" fill="#ef4444">✗</text>
  <text x="160" y="380" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="36" fill="#a1a1aa">Generic gradients</text>

  <text x="100" y="460" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="36" fill="#ef4444">✗</text>
  <text x="160" y="460" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="36" fill="#a1a1aa">Wrong spacing</text>

  <text x="100" y="540" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="36" fill="#ef4444">✗</text>
  <text x="160" y="540" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="36" fill="#a1a1aa">Inconsistent typography</text>

  <text x="100" y="620" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="36" fill="#ef4444">✗</text>
  <text x="160" y="620" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="36" fill="#a1a1aa">"That's not our brand"</text>

  <!-- Divider -->
  <rect x="100" y="720" width="200" height="3" fill="#333" rx="1"/>

  <!-- Explanation -->
  <text x="100" y="820" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="40" font-weight="500" fill="#ffffff">AI doesn't know</text>
  <text x="100" y="880" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="40" font-weight="500" fill="#ffffff">your design system.</text>

  <text x="100" y="1000" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#3b82f6">Until now.</text>

  <!-- Slide indicator dots -->
  <circle cx="450" cy="1250" r="6" fill="#444"/>
  <circle cx="480" cy="1250" r="8" fill="#3b82f6"/>
  <circle cx="510" cy="1250" r="6" fill="#444"/>
  <circle cx="540" cy="1250" r="6" fill="#444"/>
  <circle cx="570" cy="1250" r="6" fill="#444"/>
  <circle cx="600" cy="1250" r="6" fill="#444"/>
  <circle cx="630" cy="1250" r="6" fill="#444"/>
</svg>