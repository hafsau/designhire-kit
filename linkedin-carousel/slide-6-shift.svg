<svg width="1080" height="1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg6)"/>

  <!-- Title -->
  <text x="100" y="130" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff">The shift:</text>

  <!-- Before section -->
  <text x="100" y="230" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#a1a1aa">BEFORE</text>

  <rect x="100" y="260" width="880" height="200" fill="#111" rx="16" stroke="#333" stroke-width="1"/>

  <!-- Before flow -->
  <rect x="140" y="320" width="130" height="50" fill="#1e1e1e" rx="8"/>
  <text x="205" y="355" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#a1a1aa" text-anchor="middle">Designer</text>

  <text x="295" y="355" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="24" fill="#444">→</text>

  <rect x="320" y="320" width="100" height="50" fill="#1e1e1e" rx="8"/>
  <text x="370" y="355" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#a1a1aa" text-anchor="middle">Figma</text>

  <text x="445" y="355" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="24" fill="#444">→</text>

  <rect x="470" y="320" width="120" height="50" fill="#1e1e1e" rx="8"/>
  <text x="530" y="355" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#a1a1aa" text-anchor="middle">Handoff</text>

  <text x="615" y="355" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="24" fill="#444">→</text>

  <rect x="640" y="320" width="130" height="50" fill="#1e1e1e" rx="8"/>
  <text x="705" y="355" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#a1a1aa" text-anchor="middle">Engineer</text>

  <text x="795" y="355" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="24" fill="#444">→</text>

  <rect x="820" y="320" width="120" height="50" fill="#1e1e1e" rx="8"/>
  <text x="880" y="355" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#a1a1aa" text-anchor="middle">Code</text>

  <text x="540" y="430" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="24" fill="#ef4444" text-anchor="middle">Days or weeks</text>

  <!-- Now section -->
  <text x="100" y="550" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#22c55e">NOW</text>

  <rect x="100" y="580" width="880" height="200" fill="#111" rx="16" stroke="#22c55e" stroke-width="2"/>

  <!-- Now flow -->
  <rect x="180" y="640" width="160" height="60" fill="#1e1e1e" rx="8"/>
  <text x="260" y="680" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">Designer</text>

  <text x="380" y="680" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="32" fill="#22c55e">→</text>

  <rect x="420" y="640" width="200" height="60" fill="#1e1e1e" rx="8" stroke="#3b82f6" stroke-width="2"/>
  <text x="520" y="680" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="24" fill="#3b82f6" text-anchor="middle">DESIGN.md</text>

  <text x="660" y="680" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="32" fill="#22c55e">→</text>

  <rect x="700" y="640" width="160" height="60" fill="#1e1e1e" rx="8"/>
  <text x="780" y="680" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">Ship</text>

  <text x="540" y="750" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="24" fill="#22c55e" text-anchor="middle">Hours</text>

  <!-- Key stat -->
  <rect x="100" y="860" width="880" height="160" fill="#0a1628" rx="16" stroke="#3b82f6" stroke-width="2"/>
  <text x="540" y="920" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle">1 designer + DESIGN.md + AI</text>
  <text x="540" y="980" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#3b82f6" text-anchor="middle">= Output of a 3-person team</text>

  <!-- Label -->
  <text x="540" y="1100" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#ffffff" text-anchor="middle">The "Super-IC" era is here</text>

  <!-- Slide indicator dots -->
  <circle cx="450" cy="1250" r="6" fill="#444"/>
  <circle cx="480" cy="1250" r="6" fill="#444"/>
  <circle cx="510" cy="1250" r="6" fill="#444"/>
  <circle cx="540" cy="1250" r="6" fill="#444"/>
  <circle cx="570" cy="1250" r="6" fill="#444"/>
  <circle cx="600" cy="1250" r="8" fill="#3b82f6"/>
  <circle cx="630" cy="1250" r="6" fill="#444"/>
