<svg width="1080" height="1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg4)"/>

  <!-- Title -->
  <text x="100" y="150" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff">How it works:</text>

  <!-- Step 1 -->
  <circle cx="140" cy="300" r="36" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <text x="140" y="315" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#3b82f6" text-anchor="middle">1</text>
  <text x="200" y="290" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#ffffff">Export DESIGN.md</text>
  <text x="200" y="335" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="26" fill="#a1a1aa">from your design tool (Stitch, Figma)</text>

  <!-- Arrow -->
  <path d="M140 360 L140 420" stroke="#333" stroke-width="2" stroke-dasharray="8,8"/>

  <!-- Step 2 -->
  <circle cx="140" cy="480" r="36" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <text x="140" y="495" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#3b82f6" text-anchor="middle">2</text>
  <text x="200" y="470" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#ffffff">Drop it in your project</text>
  <text x="200" y="515" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="26" fill="#a1a1aa">alongside your code files</text>

  <!-- Arrow -->
  <path d="M140 540 L140 600" stroke="#333" stroke-width="2" stroke-dasharray="8,8"/>

  <!-- Step 3 -->
  <circle cx="140" cy="660" r="36" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <text x="140" y="675" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#3b82f6" text-anchor="middle">3</text>
  <text x="200" y="650" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#ffffff">Tell the AI:</text>
  <text x="200" y="700" font-family="SF Mono, Monaco, monospace" font-size="24" fill="#22c55e">"Build a dashboard following design.md"</text>

  <!-- Arrow -->
  <path d="M140 740 L140 800" stroke="#333" stroke-width="2" stroke-dasharray="8,8"/>

  <!-- Step 4 -->
  <circle cx="140" cy="860" r="36" fill="none" stroke="#22c55e" stroke-width="3"/>
  <text x="140" y="875" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#22c55e" text-anchor="middle">4</text>
  <text x="200" y="850" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#ffffff">Get consistent UI</text>
  <text x="200" y="895" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="26" fill="#a1a1aa">that actually matches your specs</text>

  <!-- Bottom emphasis -->
  <rect x="100" y="1000" width="880" height="120" fill="#111" rx="12" stroke="#22c55e" stroke-width="2"/>
  <text x="540" y="1055" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" fill="#22c55e" text-anchor="middle">No more "the spacing is wrong"</text>
  <text x="540" y="1095" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" fill="#22c55e" text-anchor="middle">No more "that's not our blue"</text>

  <!-- Slide indicator dots -->
  <circle cx="450" cy="1250" r="6" fill="#444"/>
  <circle cx="480" cy="1250" r="6" fill="#444"/>
  <circle cx="510" cy="1250" r="6" fill="#444"/>
  <circle cx="540" cy="1250" r="8" fill="#3b82f6"/>
  <circle cx="570" cy="1250" r="6" fill="#444"/>
  <circle cx="600" cy="1250" r="6" fill="#444"/>
  <circle cx="630" cy="1250" r="6" fill="#444"/>
</svg>