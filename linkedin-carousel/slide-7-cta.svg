<svg width="1080" height="1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg7)"/>

  <!-- Title -->
  <text x="100" y="180" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Get started:</text>

  <!-- Step 1 -->
  <rect x="100" y="250" width="880" height="140" fill="#111" rx="16" stroke="#333" stroke-width="1"/>
  <text x="150" y="305" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#3b82f6">1</text>
  <text x="200" y="305" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" fill="#ffffff">Check out the awesome-design-md repo</text>
  <text x="200" y="355" font-family="SF Mono, Monaco, monospace" font-size="22" fill="#a1a1aa">github.com/VoltAgent/awesome-design-md</text>

  <!-- Step 2 -->
  <rect x="100" y="420" width="880" height="140" fill="#111" rx="16" stroke="#333" stroke-width="1"/>
  <text x="150" y="475" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#3b82f6">2</text>
  <text x="200" y="475" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" fill="#ffffff">Copy a DESIGN.md that fits your project</text>
  <text x="200" y="525" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="22" fill="#a1a1aa">(or export from Google Stitch)</text>

  <!-- Step 3 -->
  <rect x="100" y="590" width="880" height="140" fill="#111" rx="16" stroke="#333" stroke-width="1"/>
  <text x="150" y="645" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#3b82f6">3</text>
  <text x="200" y="645" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" fill="#ffffff">Drop it in your project root</text>
  <text x="200" y="695" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="22" fill="#a1a1aa">Claude Code, Cursor, or any AI agent can read it</text>

  <!-- Step 4 -->
  <rect x="100" y="760" width="880" height="140" fill="#111" rx="16" stroke="#22c55e" stroke-width="2"/>
  <text x="150" y="815" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#22c55e">4</text>
  <text x="200" y="815" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="28" fill="#ffffff">Start building consistent UI</text>
  <text x="200" y="865" font-family="Inter, SF Pro Display, -apple-system, sans-serif" font-size="22" fill="#22c55e">That actually matches your design system</text>

  <!-- Slide indicator dots -->
  <circle cx="450" cy="1250" r="6" fill="#444"/>
  <circle cx="480" cy="1250" r="6" fill="#444"/>
  <circle cx="510" cy="1250" r="6" fill="#444"/>
  <circle cx="540" cy="1250" r="6" fill="#444"/>
  <circle cx="570" cy="1250" r="6" fill="#444"/>
  <circle cx="600" cy="1250" r="6" fill="#444"/>
  <circle cx="630" cy="1250" r="8" fill="#3b82f6"/>
</svg>